blank_issues_enabled: true
contact_links:
  - name: Security report
    url: https://github.com/ginkgobackup/gbf-core/blob/main/SECURITY.md
    about: |
      Reporting a security vulnerability? Do NOT open a public issue.
      Email security@ginkgobackup.com. See SECURITY.md for PGP details
      and response timelines.
  - name: GitHub Discussions
    url: https://github.com/ginkgobackup/gbf-core/discussions
    about: |
      Use Discussions for general questions, design ideas, and usage help
      that is not a bug report or a concrete feature request.
  - name: Code of Conduct
    url: https://github.com/ginkgobackup/gbf-core/blob/main/CODE_OF_CONDUCT.md
    about: |
      Enforced under the Contributor Covenant v2.1. Report violations to
      conduct@ginkgobackup.com.
